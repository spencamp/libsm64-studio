<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title description">
  <title id="title">LibSM64 Studio performance workflow</title>
  <desc id="description">Direct Live Mario, set marks, record a performance, bake a take, then edit and render it in Blender.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#20283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e12d39"/>
      <stop offset="1" stop-color="#ffbb3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#05080f" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="24" fill="url(#background)"/>
  <text x="64" y="74" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="35" font-weight="700">LibSM64 Studio</text>
  <text x="64" y="110" fill="#b9c5d7" font-family="Arial, Helvetica, sans-serif" font-size="20">Record Mario performances in Blender</text>
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <g transform="translate(64 164)">
      <rect width="192" height="126" rx="16" fill="#26334a" stroke="#51627e"/>
      <circle cx="37" cy="35" r="17" fill="url(#accent)"/>
      <text x="70" y="42" fill="#f8fafc" font-size="20" font-weight="700">Direct</text>
      <text x="24" y="85" fill="#d9e1ee" font-size="17">Live Mario</text>
      <text x="24" y="110" fill="#9eacc1" font-size="14">Rehearse the shot</text>
    </g>
    <g transform="translate(292 164)">
      <rect width="192" height="126" rx="16" fill="#26334a" stroke="#51627e"/>
      <circle cx="37" cy="35" r="17" fill="#7bc8ff"/>
      <text x="70" y="42" fill="#f8fafc" font-size="20" font-weight="700">Set marks</text>
      <text x="24" y="85" fill="#d9e1ee" font-size="17">Position + frame</text>
      <text x="24" y="110" fill="#9eacc1" font-size="14">Repeatable takes</text>
    </g>
    <g transform="translate(520 164)">
      <rect width="192" height="126" rx="16" fill="#26334a" stroke="#51627e"/>
      <circle cx="37" cy="35" r="17" fill="#ef5361"/>
      <text x="70" y="42" fill="#f8fafc" font-size="20" font-weight="700">Record</text>
      <text x="24" y="85" fill="#d9e1ee" font-size="17">Perform live</text>
      <text x="24" y="110" fill="#9eacc1" font-size="14">30 Hz geometry capture</text>
    </g>
    <g transform="translate(748 164)">
      <rect width="192" height="126" rx="16" fill="#26334a" stroke="#51627e"/>
      <circle cx="37" cy="35" r="17" fill="#ffbb3d"/>
      <text x="70" y="42" fill="#f8fafc" font-size="20" font-weight="700">Bake</text>
      <text x="24" y="85" fill="#d9e1ee" font-size="17">Create a take</text>
      <text x="24" y="110" fill="#9eacc1" font-size="14">Portable animation</text>
    </g>
    <g transform="translate(976 164)">
      <rect width="160" height="126" rx="16" fill="#26334a" stroke="#51627e"/>
      <circle cx="37" cy="35" r="17" fill="#96dd8d"/>
      <text x="70" y="42" fill="#f8fafc" font-size="20" font-weight="700">Edit</text>
      <text x="24" y="85" fill="#d9e1ee" font-size="17">Review + render</text>
      <text x="24" y="110" fill="#9eacc1" font-size="14">In Blender</text>
    </g>
  </g>
  <g fill="none" stroke="#90a0b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M262 227h20m-8-8 8 8-8 8"/>
    <path d="M490 227h20m-8-8 8 8-8 8"/>
    <path d="M718 227h20m-8-8 8 8-8 8"/>
    <path d="M946 227h20m-8-8 8 8-8 8"/>
  </g>
</svg>
